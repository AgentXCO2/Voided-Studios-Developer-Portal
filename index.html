<!DOCTYPE html>
<html>
<head>
  <title>Voided Studios Dev Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1a0033, #05010a);
      color: white;
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 320px;
      height: 100vh;
      padding: 20px;
      background: rgba(10, 0, 20, 0.9);
      border-right: 2px solid #7c3aed;
      box-shadow: 0 0 25px #7c3aed44;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 20px;
    }

    /* INPUTS */
    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border: none;
      border-radius: 6px;
      background: #120022;
      color: white;
      outline: none;
      border: 1px solid #7c3aed55;
    }

    textarea {
      resize: none;
      min-height: 60px;
      overflow: hidden;
    }

    /* BUTTON */
    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: none;
      border-radius: 6px;
      background: linear-gradient(90deg, #7c3aed, #a855f7);
      color: white;
      cursor: pointer;
      box-shadow: 0 0 12px #7c3aed66;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.03);
      box-shadow: 0 0 18px #a855f7aa;
    }

    /* CARD */
    .card {
      background: rgba(20, 0, 40, 0.8);
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid #7c3aed44;
      box-shadow: 0 0 10px #000;
    }

    .card h3 {
      color: #c084fc;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>Voided Studios Admin</h2>

  <input id="password" placeholder="Password">
  <button onclick="checkPassword()">Unlock</button>

  <div id="adminPanel" style="display:none;">
    <input id="name" placeholder="Dev Name">
    <input id="role" placeholder="Role">
    <textarea id="desc" placeholder="Description"></textarea>
    <button onclick="addDev()">Add Dev</button>
  </div>
</div>

<div class="main">
  <h1>Developers</h1>
  <div id="devList"></div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyB7cKTdERaspllDg0jTHYeJRLF-RPSZKO0",
  authDomain: "voidedstudios-733e5.firebaseapp.com",
  projectId: "voidedstudios-733e5",
  storageBucket: "voidedstudios-733e5.appspot.com",
  messagingSenderId: "660850632203",
  appId: "1:660850632203:web:f85bc6b67e4969555f490e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const devsRef = collection(db, "devs");

/* 🔐 PASSWORD */
function checkPassword() {
  const pass = document.getElementById("password").value;

  if (pass === "VoidedStudios.Agent") {
    document.getElementById("adminPanel").style.display = "block";
    alert("Unlocked");
  } else {
    alert("Wrong password");
  }
}

/* ➕ ADD DEV */
async function addDev() {
  const name = document.getElementById("name").value;
  const role = document.getElementById("role").value;
  const desc = document.getElementById("desc");

  await addDoc(devsRef, {
    name: name,
    role: role,
    description: desc.value
  });

  alert("Dev added!");
}

/* 📡 LIVE LOAD */
onSnapshot(devsRef, (snapshot) => {
  const list = document.getElementById("devList");
  list.innerHTML = "";

  snapshot.forEach(doc => {
    const d = doc.data();

    list.innerHTML += `
      <div class="card">
        <h3>${d.name}</h3>
        <b>${d.role}</b>
        <p>${d.description}</p>
      </div>
    `;
  });
});

/* 📈 AUTO EXPAND TEXTAREA */
const descBox = document.getElementById("desc");

if (descBox) {
  descBox.addEventListener("input", () => {
    descBox.style.height = "auto";
    descBox.style.height = descBox.scrollHeight + "px";
  });
}

/* expose */
window.checkPassword = checkPassword;
window.addDev = addDev;

</script>

</body>
</html>
