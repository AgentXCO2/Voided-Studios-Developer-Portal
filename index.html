<!DOCTYPE html>
<html>
<head>
  <title>Voided Studios Dev Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f1a;
      color: white;
      display: flex;
    }

    .sidebar {
      width: 300px;
      background: #1a1a2e;
      height: 100vh;
      padding: 20px;
    }

    .main {
      flex: 1;
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: none;
      background: #6c5ce7;
      color: white;
      cursor: pointer;
    }

    .card {
      background: #222;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>Admin Panel</h2>

  <input id="password" placeholder="Password">
  <button onclick="checkPassword()">Unlock</button>

  <div id="adminPanel" style="display:none;">
    <input id="name" placeholder="Dev Name">
    <input id="role" placeholder="Role">
    <input id="desc" placeholder="Description">
    <button onclick="addDev()">Add Dev</button>
  </div>
</div>

<div class="main">
  <h1>Developers</h1>
  <div id="devList"></div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyB7cKTdERaspllGd0jTHYeJRLF-RPSZKO0",
  authDomain: "voidedstudios-733e5.firebaseapp.com",
  projectId: "voidedstudios-733e5",
  storageBucket: "voidedstudios-733e5.appspot.com",
  messagingSenderId: "660850632203",
  appId: "1:660850632203:web:f85bc6b67e4969555f490e"
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const devsRef = collection(db, "devs");

// 🔐 PASSWORD CHECK
function checkPassword() {
  const pass = document.getElementById("password").value;

  if (pass === "VoidedStudios.Agent") {
    document.getElementById("adminPanel").style.display = "block";
    alert("Unlocked");
  } else {
    alert("Wrong password");
  }
}

// ➕ ADD DEV
async function addDev() {
  const name = document.getElementById("name").value;
  const role = document.getElementById("role").value;
  const desc = document.getElementById("desc").value;

  await addDoc(devsRef, {
    name: name,
    role: role,
    description: desc
  });

  alert("Dev added!");
}

// 📡 LIVE DATA LOAD
onSnapshot(devsRef, (snapshot) => {
  const list = document.getElementById("devList");
  list.innerHTML = "";

  snapshot.forEach(doc => {
    const d = doc.data();

    list.innerHTML += `
      <div class="card">
        <h3>${d.name}</h3>
        <b>${d.role}</b>
        <p>${d.description}</p>
      </div>
    `;
  });
});

// expose functions to HTML
window.checkPassword = checkPassword;
window.addDev = addDev;

</script>

</body>
</html>
