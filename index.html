<!DOCTYPE html>
<html>
<head>
  <title>Voided Studios Dev Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1a0033, #05010a);
      color: white;
    }

    .header {
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #7c3aed55;
    }

    .header h1 {
      color: #c084fc;
      margin: 0;
    }

    .main {
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }

    .card {
      background: rgba(20, 0, 40, 0.8);
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid #7c3aed44;
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.02);
      box-shadow: 0 0 18px #7c3aed55;
    }

    .card h3 {
      color: #c084fc;
      margin: 0;
    }

    .role {
      font-weight: bold;
      color: #a855f7;
    }

    .desc {
      opacity: 0.85;
      margin-top: 5px;
    }

    /* 🔥 MODAL */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      justify-content: center;
      align-items: center;
    }

    .modalContent {
      background: #1a0033;
      padding: 25px;
      border-radius: 12px;
      width: 400px;
      border: 1px solid #7c3aed66;
      box-shadow: 0 0 25px #7c3aed55;
    }

    .modalContent h2 {
      color: #c084fc;
      margin-top: 0;
    }

    .closeBtn {
      margin-top: 15px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #7c3aed;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="header">
  <h1>Voided Studios Dev Hub</h1>
</div>

<div class="main">
  <div id="devList"></div>
</div>

<!-- 🔥 MODAL -->
<div id="modal" class="modal">
  <div class="modalContent">
    <h2 id="mName"></h2>
    <p><b id="mRole"></b></p>
    <p id="mDesc"></p>

    <button class="closeBtn" onclick="closeModal()">Close</button>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyB7cKTdERaspllDg0jTHYeJRLF-RPSZKO0",
  authDomain: "voidedstudios-733e5.firebaseapp.com",
  projectId: "voidedstudios-733e5",
  storageBucket: "voidedstudios-733e5.appspot.com",
  messagingSenderId: "660850632203",
  appId: "1:660850632203:web:f85bc6b67e4969555f490e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const devsRef = collection(db, "devs");

let devCache = [];

/* LOAD DEV LIST */
onSnapshot(devsRef, (snapshot) => {
  const list = document.getElementById("devList");
  list.innerHTML = "";
  devCache = [];

  snapshot.forEach(doc => {
    const d = doc.data();
    devCache.push(d);

    list.innerHTML += `
      <div class="card" onclick="openDev('${d.name}')">
        <h3>${d.name}</h3>
        <div class="role">${d.role}</div>
        <div class="desc">${d.description}</div>
      </div>
    `;
  });
});

/* OPEN MODAL */
window.openDev = function(name) {
  const dev = devCache.find(d => d.name === name);

  if (!dev) return;

  document.getElementById("mName").innerText = dev.name;
  document.getElementById("mRole").innerText = dev.role;
  document.getElementById("mDesc").innerText = dev.description;

  document.getElementById("modal").style.display = "flex";
}

/* CLOSE MODAL */
window.closeModal = function() {
  document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
