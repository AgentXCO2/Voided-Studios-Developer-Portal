<!DOCTYPE html>
<html>
<head>
  <title>Voided Studios Dev Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1a0033, #05010a);
      color: white;
    }

    .header {
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #7c3aed55;
      box-shadow: 0 0 15px #7c3aed22;
    }

    .header h1 {
      color: #c084fc;
      margin: 0;
    }

    .main {
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }

    .card {
      background: rgba(20, 0, 40, 0.8);
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid #7c3aed44;
      box-shadow: 0 0 10px #000;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.02);
      box-shadow: 0 0 18px #7c3aed55;
    }

    .card h3 {
      color: #c084fc;
      margin: 0;
    }

    .role {
      font-weight: bold;
      color: #a855f7;
    }

    .desc {
      opacity: 0.85;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<div class="header">
  <h1>Voided Studios Dev Hub</h1>
  <p>Meet the development team</p>
</div>

<div class="main">
  <div id="devList"></div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyB7cKTdERaspllDg0jTHYeJRLF-RPSZKO0",
  authDomain: "voidedstudios-733e5.firebaseapp.com",
  projectId: "voidedstudios-733e5",
  storageBucket: "voidedstudios-733e5.appspot.com",
  messagingSenderId: "660850632203",
  appId: "1:660850632203:web:f85bc6b67e4969555f490e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const devsRef = collection(db, "devs");

/* 📡 LIVE LOAD */
onSnapshot(devsRef, (snapshot) => {
  const list = document.getElementById("devList");
  list.innerHTML = "";

  snapshot.forEach(doc => {
    const d = doc.data();

    list.innerHTML += `
      <div class="card">
        <h3>${d.name}</h3>
        <div class="role">${d.role}</div>
        <div class="desc">${d.description}</div>
      </div>
    `;
  });
});

</script>

</body>
</html>
